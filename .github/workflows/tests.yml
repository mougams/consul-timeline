name: Tests
on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6.0.2

    - name: Set up Go 1.25.3
      uses: actions/setup-go@v6.4.0
      with:
        go-version: 1.25.3

    - name: Get dependencies
      run: go get -v -t -d ./...

    - name: Build
      run: make release

    - name: Test
      run: go test -v ./...

    - name: Remove statik generated file to avoid gofmt failure
      run: rm -f server/public/statik.go

    - name: Check code formatting using gofmt
      run: |
        files="$(find . -name '*.go' \
          -not -path './server/public/statik.go' \
          -not -path './statik/statik.go' \
          -exec gofmt -l {} +)"
        if [ -n "$files" ]; then
          echo "$files"
          exit 1
        fi
