name: golangci-lint
on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version: 1.25.3
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
