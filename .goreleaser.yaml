version: 2

project_name: consul-timeline

before:
  hooks:
    - go install github.com/rakyll/statik
    - statik -f -src=./public -dest=server/ -p public

builds:
  - id: consul-timeline
    binary: consul-timeline
    main: .
    flags:
      - -tags=release
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64

archives:
  - name_template: "{{ .ProjectName }}_{{ .Version }}_{{- .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: github
  sort: asc
  abbrev: -1
  filters:
    exclude:
      - "^docs:"
      - "^test:"
  groups:
    - title: Breaking changes
      regexp: "^.*?(\\([[:word:]]+\\))??!:.+$"
      order: 0
    - title: Enhancements
      regexp: "^.*?feat(\\([[:word:]]+\\))??!?:.+$"
      order: 1
    - title: Fixes
      regexp: "^.*?fix(\\([[:word:]]+\\))??!?:.+$"
      order: 2
    - title: Internal
      regexp: "^.+$"
      order: 999
